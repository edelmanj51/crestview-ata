ABOUT_TEXT: "Crestview ATA Martial Arts has been empowering Crestview families through Songahm Taekwondo since 1992, offering structured programs for ages 4 through adult in a 5,000-square-foot climate-controlled facility on S Ferdon Blvd. As part of the ATA — the world's largest martial arts organization with over 1 million students trained since 1969 — Crestview ATA combines a proven curriculum with deeply personal instruction that builds confidence, discipline, and real-world self-defense skills."

INSTRUCTOR_1_NAME: "Chief Master Darrin Palmer"
INSTRUCTOR_1_TITLE: "Owner · 8th Degree Black Belt"
INSTRUCTOR_1_BIO: "Chief Master Darrin Palmer began his martial arts journey as a child, earning his way to an 8th Degree Black Belt and founding the Crestview location in 1992 with a mission to empower individuals of all ages through the transformative power of martial arts. Over three decades later, he oversees five ATA schools across Northwest Florida, personally mentoring instructors and students at each location. His teaching philosophy centers on the belief that martial arts is a road map to confidence, leadership, and a better life."

INSTRUCTOR_2_NAME: "Master Kesha DeShields"
INSTRUCTOR_2_TITLE: "Head Instructor · 6th Degree Black Belt · World Champion"
INSTRUCTOR_2_BIO: "Master Kesha DeShields is a 6th Degree Black Belt, World Champion Taekwondo athlete, and dedicated instructor whose passion for martial arts inspires students to achieve excellence through discipline, confidence, and perseverance. Her leadership, competitive success, and commitment to developing strong character make her an outstanding role model in the Taekwondo community."

